function g(){
    if(d.length === 0) return;
    const s = d[Math.floor(Math.random() * d.length)];
    if(!s.episodes || s.episodes.length === 0 || s.episodes[0] === "") { g(); return; }
    const epIndex = Math.floor(Math.random() * s.episodes.length);
    const item = s.episodes[epIndex];
    
   
    let epNum = epIndex + 1;
    let title = item;
    
    if (typeof item === 'object') {
        epNum = item.ep;
        title = item.t;
    }
    
    document.getElementById("result").innerText = `${s.n}\n第 ${epNum} 話\n『${title}』`;
    
    const oldBtn = document.getElementById("t-btn");
    if(oldBtn) oldBtn.remove();
    
    if(s.url && s.url !== "") {
        const btn = document.createElement("button");
        btn.id = "t-btn";
        btn.innerText = `TELASAで ${s.n} を観る ➔`;
        btn.style.cssText = "background: #ff6600; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 100%;";
        btn.onclick = function() { window.open(s.url, '_blank'); };
        document.getElementById("result").appendChild(document.createElement("br"));
        document.getElementById("result").appendChild(btn);
    } 
}
